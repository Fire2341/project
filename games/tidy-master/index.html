<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>收纳大师 - Tidy Master</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow-x: hidden;
        }
        .game-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            text-align: center;
            color: #fff;
            padding: 20px 0;
        }
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .level-info {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
            font-size: 14px;
        }
        .level-info span {
            background: rgba(255,255,255,0.2);
            padding: 5px 15px;
            border-radius: 20px;
        }
        .scene-container {
            background: #fff;
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            min-height: 400px;
            position: relative;
        }
        .scene-title {
            text-align: center;
            color: #333;
            font-size: 18px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px dashed #eee;
        }
        .storage-area {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            border-radius: 15px;
            padding: 20px;
            min-height: 300px;
            position: relative;
            border: 3px dashed #ccc;
        }
        .storage-area.completed {
            border-color: #4caf50;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
        }
        .item {
            position: absolute;
            cursor: grab;
            user-select: none;
            transition: transform 0.2s;
            filter: drop-shadow(0 3px 6px rgba(0,0,0,0.2));
        }
        .item:active {
            cursor: grabbing;
            transform: scale(1.1);
            z-index: 1000;
        }
        .item.dragging {
            opacity: 0.8;
            z-index: 1000;
        }
        .item-placed {
            animation: placeItem 0.3s ease-out;
        }
        @keyframes placeItem {
            0% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        /* 原有物品样式 */
        .item-book {
            width: 40px;
            height: 55px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
            border-radius: 3px;
            border-left: 5px solid rgba(0,0,0,0.2);
        }
        .item-bottle {
            width: 30px;
            height: 60px;
            background: linear-gradient(135deg, #4ecdc4 0%, #44a8a0 100%);
            border-radius: 5px 5px 15px 15px;
        }
        .item-box {
            width: 50px;
            height: 40px;
            background: linear-gradient(135deg, #ffe66d 0%, #f4d03f 100%);
            border-radius: 5px;
        }
        .item-phone {
            width: 35px;
            height: 60px;
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            border-radius: 8px;
            border: 3px solid #555;
        }
        .item-cosmetic {
            width: 25px;
            height: 50px;
            background: linear-gradient(135deg, #ff9ff3 0%, #f368e0 100%);
            border-radius: 3px 3px 12px 12px;
        }
        /* 衣柜物品 */
        .item-clothes {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #74b9ff 0%, #0984e3 100%);
            border-radius: 5px;
            position: relative;
        }
        .item-clothes::before {
            content: '👕';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
        }
        .item-shoe {
            width: 45px;
            height: 30px;
            background: linear-gradient(135deg, #d63031 0%, #b71540 100%);
            border-radius: 15px 15px 5px 5px;
            position: relative;
        }
        .item-shoe::before {
            content: '👟';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20px;
        }
        .item-bag {
            width: 40px;
            height: 45px;
            background: linear-gradient(135deg, #fdcb6e 0%, #e17055 100%);
            border-radius: 5px 5px 10px 10px;
            position: relative;
        }
        .item-bag::before {
            content: '👜';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 22px;
        }
        /* 厨房物品 */
        .item-dish {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #dfe6e9 0%, #b2bec3 100%);
            border-radius: 50%;
            border: 3px solid #fff;
            position: relative;
        }
        .item-dish::before {
            content: '🍽️';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
        }
        .item-spice {
            width: 30px;
            height: 45px;
            background: linear-gradient(135deg, #a29bfe 0%, #6c5ce7 100%);
            border-radius: 3px;
            position: relative;
        }
        .item-spice::before {
            content: '🧂';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
        }
        .item-pot {
            width: 55px;
            height: 40px;
            background: linear-gradient(135deg, #636e72 0%, #2d3436 100%);
            border-radius: 5px 5px 15px 15px;
            position: relative;
        }
        .item-pot::before {
            content: '🍳';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
        }
        /* 工具物品 */
        .item-wrench {
            width: 50px;
            height: 20px;
            background: linear-gradient(135deg, #b2bec3 0%, #636e72 100%);
            border-radius: 5px;
            position: relative;
            transform: rotate(-45deg);
        }
        .item-wrench::before {
            content: '🔧';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
        }
        .item-screwdriver {
            width: 50px;
            height: 15px;
            background: linear-gradient(135deg, #fdcb6e 0%, #e17055 100%);
            border-radius: 3px;
            position: relative;
            transform: rotate(45deg);
        }
        .item-screwdriver::before {
            content: '🪛';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20px;
        }
        .item-hammer {
            width: 45px;
            height: 50px;
            background: linear-gradient(135deg, #8b4513 0%, #5d4037 100%);
            border-radius: 5px;
            position: relative;
        }
        .item-hammer::before {
            content: '🔨';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px;
        }
        /* 行李箱物品 */
        .item-tshirt {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #55efc4 0%, #00b894 100%);
            border-radius: 5px;
            position: relative;
        }
        .item-tshirt::before {
            content: '👕';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 22px;
        }
        .item-pants {
            width: 40px;
            height: 50px;
            background: linear-gradient(135deg, #0984e3 0%, #0749a5 100%);
            border-radius: 5px;
            position: relative;
        }
        .item-pants::before {
            content: '👖';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 22px;
        }
        .item-sock {
            width: 30px;
            height: 40px;
            background: linear-gradient(135deg, #fd79a8 0%, #e84393 100%);
            border-radius: 5px 5px 15px 15px;
            position: relative;
        }
        .item-sock::before {
            content: '🧦';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
        }
        .item-hat {
            width: 45px;
            height: 35px;
            background: linear-gradient(135deg, #a29bfe 0%, #6c5ce7 100%);
            border-radius: 10px 10px 5px 5px;
            position: relative;
        }
        .item-hat::before {
            content: '🧢';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 22px;
        }
        .slot {
            position: absolute;
            border: 2px dashed rgba(102, 126, 234, 0.3);
            border-radius: 8px;
            background: rgba(102, 126, 234, 0.05);
        }
        .slot.highlight {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.15);
        }
        .slot.filled {
            border-color: transparent;
            background: transparent;
        }
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }
        .btn-secondary {
            background: #fff;
            color: #667eea;
            border: 2px solid #667eea;
        }
        .btn-secondary:hover {
            background: #f8f9ff;
        }
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
            z-index: 1000;
        }
        .success-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .success-modal.show {
            display: flex;
        }
        .modal-content {
            background: #fff;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            animation: modalPop 0.4s ease-out;
        }
        @keyframes modalPop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .modal-content h2 {
            color: #4caf50;
            font-size: 32px;
            margin-bottom: 20px;
        }
        .modal-content p {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }
        .star-rating {
            font-size: 40px;
            margin-bottom: 20px;
        }
        .hint-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="progress-bar" id="progressBar" style="width: 0%"></div>
    
    <div class="game-container">
        <div class="header">
            <h1>🎯 收纳大师</h1>
            <div class="level-info">
                <span>关卡: <strong id="levelNum">1</strong></span>
                <span>物品: <strong id="itemCount">0/0</strong></span>
                <span>时间: <strong id="timer">00:00</strong></span>
            </div>
        </div>

        <div class="scene-container">
            <div class="scene-title" id="sceneTitle">混乱的书桌</div>
            <div class="storage-area" id="storageArea"></div>
        </div>

        <div class="controls">
            <button class="btn btn-secondary" onclick="resetLevel()">重置</button>
            <button class="btn btn-primary" onclick="nextLevel()">下一关 →</button>
        </div>
    </div>

    <button class="hint-btn" onclick="showHint()" title="提示">💡</button>

    <div class="success-modal" id="successModal">
        <div class="modal-content">
            <h2>🎉 收纳完成!</h2>
            <div class="star-rating">⭐⭐⭐</div>
            <p>太棒了！所有物品都归位了</p>
            <button class="btn btn-primary" onclick="closeModal()">继续</button>
        </div>
    </div>

    <script>
        const scenes = [
            { title: '📚 混乱的书桌', items: [{ type: 'book', count: 3 }, { type: 'phone', count: 1 }, { type: 'cosmetic', count: 2 }], layout: 'desk' },
            { title: '🧊 杂乱的冰箱', items: [{ type: 'bottle', count: 4 }, { type: 'box', count: 3 }], layout: 'fridge' },
            { title: '💄 化妆台整理', items: [{ type: 'cosmetic', count: 5 }, { type: 'phone', count: 1 }, { type: 'book', count: 1 }], layout: 'dresser' },
            { title: '📦 储物间收纳', items: [{ type: 'box', count: 6 }, { type: 'book', count: 2 }, { type: 'bottle', count: 2 }], layout: 'storage' },
            { title: '👗 衣柜整理', items: [{ type: 'clothes', count: 4 }, { type: 'shoe', count: 3 }, { type: 'bag', count: 2 }], layout: 'wardrobe' },
            { title: '🍳 厨房收纳', items: [{ type: 'dish', count: 4 }, { type: 'spice', count: 3 }, { type: 'pot', count: 2 }], layout: 'kitchen' },
            { title: '🔧 工具箱整理', items: [{ type: 'wrench', count: 3 }, { type: 'screwdriver', count: 3 }, { type: 'hammer', count: 2 }], layout: 'toolbox' },
            { title: '🧳 行李箱打包', items: [{ type: 'tshirt', count: 3 }, { type: 'pants', count: 2 }, { type: 'sock', count: 3 }, { type: 'hat', count: 1 }], layout: 'suitcase' }
        ];

        let currentLevel = 0, placedItems = 0, totalItems = 0, startTime = Date.now(), timerInterval, draggedItem = null, slots = [];

        function initLevel() {
            const scene = scenes[currentLevel];
            document.getElementById('sceneTitle').textContent = scene.title;
            document.getElementById('levelNum').textContent = currentLevel + 1;
            
            const area = document.getElementById('storageArea');
            area.innerHTML = '';
            area.classList.remove('completed');
            
            slots = createSlots(scene.layout, area);
            
            let itemId = 0;
            scene.items.forEach(itemType => {
                for (let i = 0; i < itemType.count; i++) {
                    createItem(itemType.type, itemId++, area);
                }
            });
            
            totalItems = itemId;
            placedItems = 0;
            updateProgress();
            startTimer();
        }

        function createSlots(layout, container) {
            const slotPositions = {
                desk: [{ x: 10, y: 10, w: 80, h: 100 }, { x: 100, y: 10, w: 80, h: 100 }, { x: 190, y: 10, w: 80, h: 100 }, { x: 10, y: 120, w: 100, h: 80 }, { x: 120, y: 120, w: 100, h: 80 }, { x: 230, y: 120, w: 100, h: 80 }],
                fridge: [{ x: 10, y: 10, w: 100, h: 120 }, { x: 120, y: 10, w: 100, h: 120 }, { x: 230, y: 10, w: 100, h: 120 }, { x: 10, y: 140, w: 100, h: 120 }, { x: 120, y: 140, w: 100, h: 120 }, { x: 230, y: 140, w: 100, h: 120 }],
                dresser: [{ x: 10, y: 10, w: 60, h: 80 }, { x: 80, y: 10, w: 60, h: 80 }, { x: 150, y: 10, w: 60, h: 80 }, { x: 220, y: 10, w: 60, h: 80 }, { x: 290, y: 10, w: 60, h: 80 }, { x: 80, y: 100, w: 80, h: 100 }, { x: 170, y: 100, w: 80, h: 100 }],
                storage: [{ x: 10, y: 10, w: 90, h: 90 }, { x: 110, y: 10, w: 90, h: 90 }, { x: 210, y: 10, w: 90, h: 90 }, { x: 10, y: 110, w: 90, h: 90 }, { x: 110, y: 110, w: 90, h: 90 }, { x: 210, y: 110, w: 90, h: 90 }, { x: 10, y: 210, w: 90, h: 90 }, { x: 110, y: 210, w: 90, h: 90 }, { x: 210, y: 210, w: 90, h: 90 }],
                wardrobe: [{ x: 10, y: 10, w: 100, h: 100 }, { x: 120, y: 10, w: 100, h: 100 }, { x: 230, y: 10, w: 100, h: 100 }, { x: 10, y: 120, w: 100, h: 80 }, { x: 120, y: 120, w: 100, h: 80 }, { x: 230, y: 120, w: 100, h: 80 }, { x: 10, y: 210, w: 100, h: 80 }, { x: 120, y: 210, w: 100, h: 80 }, { x: 230, y: 210, w: 100, h: 80 }],
                kitchen: [{ x: 10, y: 10, w: 90, h: 90 }, { x: 110, y: 10, w: 90, h: 90 }, { x: 210, y: 10, w: 90, h: 90 }, { x: 10, y: 110, w: 90, h: 90 }, { x: 110, y: 110, w: 90, h: 90 }, { x: 210, y: 110, w: 90, h: 90 }, { x: 10, y: 210, w: 90, h: 90 }, { x: 110, y: 210, w: 90, h: 90 }, { x: 210, y: 210, w: 90, h: 90 }],
                toolbox: [{ x: 10, y: 10, w: 100, h: 70 }, { x: 120, y: 10, w: 100, h: 70 }, { x: 230, y: 10, w: 100, h: 70 }, { x: 10, y: 90, w: 100, h: 70 }, { x: 120, y: 90, w: 100, h: 70 }, { x: 230, y: 90, w: 100, h: 70 }, { x: 10, y: 170, w: 100, h: 70 }, { x: 120, y: 170, w: 100, h: 70 }],
                suitcase: [{ x: 10, y: 10, w: 80, h: 80 }, { x: 100, y: 10, w: 80, h: 80 }, { x: 190, y: 10, w: 80, h: 80 }, { x: 280, y: 10, w: 80, h: 80 }, { x: 10, y: 100, w: 80, h: 80 }, { x: 100, y: 100, w: 80, h: 80 }, { x: 190, y: 100, w: 80, h: 80 }, { x: 280, y: 100, w: 80, h: 80 }, { x: 10, y: 190, w: 80, h: 80 }]
            };

            const positions = slotPositions[layout] || slotPositions.desk;
            return positions.map((pos, i) => {
                const slot = document.createElement('div');
                slot.className = 'slot';
                slot.style.cssText = `left:${pos.x}px;top:${pos.y}px;width:${pos.w}px;height:${pos.h}px`;
                slot.dataset.index = i;
                container.appendChild(slot);
                return slot;
            });
        }

        function createItem(type, id, container) {
            const item = document.createElement('div');
            item.className = `item item-${type}`;
            item.dataset.id = id;
            item.dataset.type = type;
            const x = 20 + Math.random() * 250, y = 20 + Math.random() * 200;
            item.style.cssText = `left:${x}px;top:${y}px`;
            item.addEventListener('mousedown', startDrag);
            item.addEventListener('touchstart', startDrag, { passive: false });
            container.appendChild(item);
        }

        function startDrag(e) {
            e.preventDefault();
            draggedItem = e.target.closest('.item');
            if (!draggedItem) return;
            draggedItem.classList.add('dragging');
            
            const touch = e.touches ? e.touches[0] : e;
            const rect = draggedItem.getBoundingClientRect();
            const offsetX = touch.clientX - rect.left, offsetY = touch.clientY - rect.top;
            const container = document.getElementById('storageArea').getBoundingClientRect();
            
            function move(e) {
                const touch = e.touches ? e.touches[0] : e;
                draggedItem.style.left = (touch.clientX - container.left - offsetX) + 'px';
                draggedItem.style.top = (touch.clientY - container.top - offsetY) + 'px';
                highlightNearestSlot(draggedItem);
            }
            function end() {
                document.removeEventListener('mousemove', move);
                document.removeEventListener('mouseup', end);
                document.removeEventListener('touchmove', move);
                document.removeEventListener('touchend', end);
                draggedItem.classList.remove('dragging');
                checkPlacement(draggedItem);
                draggedItem = null;
                slots.forEach(s => s.classList.remove('highlight'));
            }
            document.addEventListener('mousemove', move);
            document.addEventListener('mouseup', end);
            document.addEventListener('touchmove', move, { passive: false });
            document.addEventListener('touchend', end);
        }

        function highlightNearestSlot(item) {
            slots.forEach(s => s.classList.remove('highlight'));
            const itemRect = item.getBoundingClientRect(), itemCenter = { x: itemRect.left + itemRect.width/2, y: itemRect.top + itemRect.height/2 };
            let nearest = null, minDist = Infinity;
            slots.forEach(slot => {
                if (slot.classList.contains('filled')) return;
                const rect = slot.getBoundingClientRect(), center = { x: rect.left + rect.width/2, y: rect.top + rect.height/2 };
                const dist = Math.hypot(itemCenter.x - center.x, itemCenter.y - center.y);
                if (dist < minDist && dist < 80) { minDist = dist; nearest = slot; }
            });
            if (nearest) nearest.classList.add('highlight');
        }

        function checkPlacement(item) {
            const itemRect = item.getBoundingClientRect(), itemCenter = { x: itemRect.left + itemRect.width/2, y: itemRect.top + itemRect.height/2 };
            for (let slot of slots) {
                if (slot.classList.contains('filled')) continue;
                const rect = slot.getBoundingClientRect();
                if (itemCenter.x >= rect.left && itemCenter.x <= rect.right && itemCenter.y >= rect.top && itemCenter.y <= rect.bottom) {
                    const container = document.getElementById('storageArea').getBoundingClientRect();
                    item.style.left = (rect.left - container.left + rect.width/2 - itemRect.width/2) + 'px';
                    item.style.top = (rect.top - container.top + rect.height/2 - itemRect.height/2) + 'px';
                    item.classList.add('item-placed');
                    slot.classList.add('filled');
                    item.dataset.placed = 'true';
                    placedItems++; updateProgress();
                    if (placedItems === totalItems) levelComplete();
                    return;
                }
            }
        }

        function updateProgress() {
            document.getElementById('itemCount').textContent = `${placedItems}/${totalItems}`;
            document.getElementById('progressBar').style.width = (placedItems / totalItems * 100) + '%';
        }

        function startTimer() {
            clearInterval(timerInterval);
            startTime = Date.now();
            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                document.getElementById('timer').textContent = `${String(Math.floor(elapsed/60)).padStart(2,'0')}:${String(elapsed%60).padStart(2,'0')}`;
            }, 1000);
        }

        function levelComplete() {
            clearInterval(timerInterval);
            document.getElementById('storageArea').classList.add('completed');
            setTimeout(() => document.getElementById('successModal').classList.add('show'), 500);
        }

        function closeModal() { document.getElementById('successModal').classList.remove('show'); nextLevel(); }
        function nextLevel() { currentLevel = (currentLevel + 1) % scenes.length; initLevel(); }
        function resetLevel() { initLevel(); }
        function showHint() {
            const items = document.querySelectorAll('.item:not([data-placed="true"])');
            if (items.length > 0) {
                items[0].animate([{ transform: 'scale(1)' }, { transform: 'scale(1.2)' }, { transform: 'scale(1)' }], { duration: 600, iterations: 3 });
            }
        }

        initLevel();
    </script>
</body>
</html>
