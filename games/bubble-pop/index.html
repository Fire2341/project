<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>泡泡消消乐 - Bubble Match</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --bg-dark: #0a0a0f;
            --bubble-red: #ff6b6b;
            --bubble-blue: #4ecdc4;
            --bubble-green: #95e1d3;
            --bubble-yellow: #ffd93d;
            --bubble-purple: #a8e6cf;
        }
        
        body {
            background: linear-gradient(180deg, #1a1a2e 0%, #0a0a0f 100%);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        /* 顶部信息栏 */
        .top-bar {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }
        
        .level-info {
            color: #fff;
        }
        
        .level-num {
            font-size: 24px;
            font-weight: 700;
        }
        
        .level-label {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
        }
        
        .score-board {
            text-align: center;
            color: #ffd700;
        }
        
        .score-value {
            font-size: 28px;
            font-weight: 700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }
        
        .score-label {
            font-size: 11px;
            color: rgba(255,215,0,0.7);
        }
        
        .moves-left {
            text-align: right;
            color: #fff;
        }
        
        .moves-value {
            font-size: 24px;
            font-weight: 700;
            color: #ff6b6b;
        }
        
        .moves-label {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
        }
        
        /* 任务目标 */
        .mission-bar {
            padding: 10px 20px;
            background: rgba(255,255,255,0.05);
            display: flex;
            gap: 15px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        
        .mission-bar::-webkit-scrollbar { display: none; }
        
        .mission-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            border: 2px solid transparent;
            transition: all 0.3s;
        }
        
        .mission-item.completed {
            border-color: #4caf50;
            background: rgba(76, 175, 80, 0.2);
        }
        
        .mission-bubble {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        
        .mission-text {
            color: #fff;
            font-size: 14px;
            font-weight: 600;
        }
        
        .mission-text span {
            color: #ffd700;
        }
        
        /* 游戏区域 */
        .game-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }
        
        .grid-container {
            position: relative;
            background: rgba(0,0,0,0.2);
            border-radius: 15px;
            padding: 10px;
            box-shadow: inset 0 2px 20px rgba(0,0,0,0.5);
        }
        
        .bubble-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 4px;
            width: min(85vw, 400px);
            aspect-ratio: 1;
        }
        
        /* 泡泡样式 */
        .bubble-cell {
            aspect-ratio: 1;
            position: relative;
            cursor: pointer;
        }
        
        .bubble {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 
                inset -3px -3px 8px rgba(0,0,0,0.3),
                inset 3px 3px 8px rgba(255,255,255,0.4),
                0 4px 10px rgba(0,0,0,0.3);
        }
        
        .bubble::before {
            content: '';
            position: absolute;
            top: 12%; left: 15%;
            width: 30%; height: 25%;
            background: radial-gradient(ellipse, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.3) 60%, transparent 70%);
            border-radius: 50%;
            transform: rotate(-20deg);
        }
        
        /* 五种颜色 */
        .bubble-red { background: radial-gradient(circle at 30% 30%, #ff8e8e, #ff6b6b); }
        .bubble-blue { background: radial-gradient(circle at 30% 30%, #7fdbda, #4ecdc4); }
        .bubble-green { background: radial-gradient(circle at 30% 30%, #b8f0e6, #95e1d3); }
        .bubble-yellow { background: radial-gradient(circle at 30% 30%, #ffe566, #ffd93d); }
        .bubble-purple { background: radial-gradient(circle at 30% 30%, #c8f0e4, #a8e6cf); }
        
        /* 选中状态 */
        .bubble.selected {
            transform: scale(1.15);
            box-shadow: 
                inset -3px -3px 8px rgba(0,0,0,0.3),
                inset 3px 3px 8px rgba(255,255,255,0.4),
                0 0 20px rgba(255,255,255,0.6),
                0 0 40px rgba(255,255,255,0.3);
            animation: selectedPulse 1s ease-in-out infinite;
        }
        
        @keyframes selectedPulse {
            0%, 100% { transform: scale(1.15); }
            50% { transform: scale(1.2); }
        }
        
        /* 匹配提示 */
        .bubble.hint {
            animation: hintShake 0.5s ease-in-out infinite;
        }
        
        @keyframes hintShake {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            25% { transform: translateX(-3px) rotate(-5deg); }
            75% { transform: translateX(3px) rotate(5deg); }
        }
        
        /* 消除动画 */
        .bubble.removing {
            animation: popOut 0.3s ease-out forwards;
        }
        
        @keyframes popOut {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.8; }
            100% { transform: scale(0); opacity: 0; }
        }
        
        /* 下落动画 */
        .bubble.falling {
            animation: fallIn 0.4s ease-out;
        }
        
        @keyframes fallIn {
            0% { transform: translateY(-50px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        
        /* 特效泡泡 */
        .bubble.special-bomb {
            background: radial-gradient(circle at 30% 30%, #ff6b6b, #c0392b);
            box-shadow: 0 0 20px #ff6b6b, inset -3px -3px 8px rgba(0,0,0,0.3), inset 3px 3px 8px rgba(255,255,255,0.4);
        }
        
        .bubble.special-bomb::after {
            content: '💣';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20px;
        }
        
        .bubble.special-row {
            background: radial-gradient(circle at 30% 30%, #3498db, #2980b9);
            box-shadow: 0 0 20px #3498db, inset -3px -3px 8px rgba(0,0,0,0.3), inset 3px 3px 8px rgba(255,255,255,0.4);
        }
        
        .bubble.special-row::after {
            content: '↔️';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 16px;
        }
        
        /* 连击显示 */
        .combo-display {
            position: fixed;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 1000;
            text-align: center;
        }
        
        .combo-text {
            font-size: 64px;
            font-weight: 900;
            background: linear-gradient(135deg, #ffd700 0%, #ff6b6b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0;
            text-shadow: 0 0 60px rgba(255, 215, 0, 0.5);
        }
        
        .combo-text.show {
            animation: comboShow 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
        }
        
        @keyframes comboShow {
            0% { opacity: 0; transform: scale(0) rotate(-15deg); }
            30% { opacity: 1; transform: scale(1.3) rotate(5deg); }
            60% { opacity: 1; transform: scale(1) rotate(0deg); }
            100% { opacity: 0; transform: scale(0.8) translateY(-30px); }
        }
        
        /* 粒子效果 */
        .particle {
            position: fixed;
            pointer-events: none;
            border-radius: 50%;
            animation: particleFly 0.6s ease-out forwards;
        }
        
        @keyframes particleFly {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }
        
        /* 底部控制 */
        .bottom-controls {
            padding: 15px 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        
        .control-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:hover { transform: translateY(-2px); }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        /* 胜利/失败弹窗 */
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        
        .modal.show { display: flex; }
        
        .modal-content {
            background: linear-gradient(135deg, #2d2d44 0%, #1a1a2e 100%);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 300px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .modal-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
        
        .modal-title {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 10px;
        }
        
        .modal-title.win { color: #4caf50; }
        .modal-title.lose { color: #ff6b6b; }
        
        .modal-score {
            font-size: 18px;
            color: #ffd700;
            margin-bottom: 20px;
        }
        
        .stars {
            font-size: 36px;
            margin-bottom: 20px;
        }
        
        /* 进度条 */
        .progress-container {
            padding: 0 20px 10px;
        }
        
        .progress-bar {
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 3px;
            transition: width 0.5s ease-out;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.5);
        }
    </style>
</head>
<body>
    <!-- 顶部信息 -->
    <div class="top-bar">
        <div class="level-info">
            <div class="level-label">关卡</div>
            <div class="level-num" id="levelNum">1</div>
        </div>
        <div class="score-board">
            <div class="score-label">得分</div>
            <div class="score-value" id="score">0</div>
        </div>
        <div class="moves-left">
            <div class="moves-label">剩余步数</div>
            <div class="moves-value" id="moves">20</div>
        </div>
    </div>
    
    <!-- 任务目标 -->
    <div class="mission-bar" id="missionBar"></div>
    
    <!-- 进度条 -->
    <div class="progress-container">
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>
    </div>
    
    <!-- 游戏区域 -->
    <div class="game-area">
        <div class="grid-container">
            <div class="bubble-grid" id="grid"></div>
        </div>
    </div>
    
    <!-- 连击显示 -->
    <div class="combo-display">
        <div class="combo-text" id="comboText"></div>
    </div>
    
    <!-- 底部控制 -->
    <div class="bottom-controls">
        <button class="control-btn btn-secondary" onclick="showHint()">💡 提示</button>
        <button class="control-btn btn-primary" onclick="restartLevel()">🔄 重开</button>
    </div>
    
    <!-- 弹窗 -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-icon" id="modalIcon">🎉</div>
            <div class="modal-title" id="modalTitle">通关!</div>
            <div class="modal-score" id="modalScore">得分: 0</div>
            <div class="stars" id="modalStars">⭐⭐⭐</div>
            <button class="control-btn btn-primary" onclick="nextLevel()" id="modalBtn">下一关 →</button>
        </div>
    </div>

    <script>
        const COLORS = ['red', 'blue', 'green', 'yellow', 'purple'];
        const GRID_SIZE = 8;
        const CELL_COUNT = GRID_SIZE * GRID_SIZE;
        
        let grid = [];
        let selectedCell = null;
        let score = 0;
        let moves = 20;
        let level = 1;
        let isProcessing = false;
        let mission = {};
        let missionProgress = {};
        
        // 关卡配置
        const levels = [
            { moves: 20, mission: { red: 10 }, targetScore: 1000 },
            { moves: 25, mission: { red: 15, blue: 15 }, targetScore: 2000 },
            { moves: 30, mission: { yellow: 20, green: 20 }, targetScore: 3000 },
            { moves: 25, mission: { red: 10, blue: 10, green: 10, yellow: 10 }, targetScore: 4000 },
            { moves: 20, mission: { purple: 30 }, targetScore: 5000 }
        ];
        
        function initLevel() {
            const config = levels[(level - 1) % levels.length];
            moves = config.moves;
            mission = { ...config.mission };
            missionProgress = {};
            Object.keys(mission).forEach(k => missionProgress[k] = 0);
            score = 0;
            selectedCell = null;
            isProcessing = false;
            
            updateUI();
            renderMission();
            initGrid();
        }
        
        function initGrid() {
            grid = [];
            for (let i = 0; i < CELL_COUNT; i++) {
                grid.push(createRandomBubble());
            }
            
            // 确保初始没有匹配
            while (findMatches().length > 0) {
                grid = [];
                for (let i = 0; i < CELL_COUNT; i++) {
                    grid.push(createRandomBubble());
                }
            }
            
            renderGrid();
        }
        
        function createRandomBubble() {
            return {
                color: COLORS[Math.floor(Math.random() * COLORS.length)],
                special: null
            };
        }
        
        function renderMission() {
            const bar = document.getElementById('missionBar');
            bar.innerHTML = '';
            
            Object.entries(mission).forEach(([color, target]) => {
                const current = missionProgress[color] || 0;
                const completed = current >= target;
                
                const item = document.createElement('div');
                item.className = `mission-item ${completed ? 'completed' : ''}`;
                item.innerHTML = `
                    <div class="mission-bubble bubble-${color}"></div>
                    <div class="mission-text">${current}/<span>${target}</span></div>
                `;
                bar.appendChild(item);
            });
            
            // 更新进度条
            const totalTarget = Object.values(mission).reduce((a, b) => a + b, 0);
            const totalCurrent = Object.values(missionProgress).reduce((a, b) => a + b, 0);
            const progress = Math.min(100, (totalCurrent / totalTarget) * 100);
            document.getElementById('progressFill').style.width = progress + '%';
        }
        
        function renderGrid() {
            const gridEl = document.getElementById('grid');
            gridEl.innerHTML = '';
            
            grid.forEach((cell, index) => {
                const cellEl = document.createElement('div');
                cellEl.className = 'bubble-cell';
                cellEl.dataset.index = index;
                
                if (cell) {
                    const bubble = document.createElement('div');
                    bubble.className = `bubble bubble-${cell.color}`;
                    if (cell.special) bubble.classList.add(`special-${cell.special}`);
                    if (index === selectedCell) bubble.classList.add('selected');
                    cellEl.appendChild(bubble);
                }
                
                cellEl.addEventListener('click', () => onCellClick(index));
                gridEl.appendChild(cellEl);
            });
        }
        
        function onCellClick(index) {
            if (isProcessing || !grid[index]) return;
            
            if (selectedCell === null) {
                selectedCell = index;
                renderGrid();
            } else if (selectedCell === index) {
                selectedCell = null;
                renderGrid();
            } else if (isAdjacent(selectedCell, index)) {
                trySwap(selectedCell, index);
            } else {
                selectedCell = index;
                renderGrid();
            }
        }
        
        function isAdjacent(a, b) {
            const ax = a % GRID_SIZE, ay = Math.floor(a / GRID_SIZE);
            const bx = b % GRID_SIZE, by = Math.floor(b / GRID_SIZE);
            return Math.abs(ax - bx) + Math.abs(ay - by) === 1;
        }
        
        async function trySwap(a, b) {
            isProcessing = true;
            selectedCell = null;
            
            // 交换
            [grid[a], grid[b]] = [grid[b], grid[a]];
            renderGrid();
            
            const matches = findMatches();
            
            if (matches.length === 0) {
                // 没有匹配，交换回来
                await sleep(200);
                [grid[a], grid[b]] = [grid[b], grid[a]];
                renderGrid();
                isProcessing = false;
            } else {
                // 有匹配，执行消除
                moves--;
                updateUI();
                await processMatches();
                
                if (moves <= 0) {
                    checkGameEnd();
                }
            }
        }
        
        function findMatches() {
            const matches = new Set();
            
            // 检查横向
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE - 2; x++) {
                    const idx = y * GRID_SIZE + x;
                    if (!grid[idx] || !grid[idx + 1] || !grid[idx + 2]) continue;
                    
                    const c1 = grid[idx].color;
                    if (grid[idx + 1].color === c1 && grid[idx + 2].color === c1) {
                        matches.add(idx);
                        matches.add(idx + 1);
                        matches.add(idx + 2);
                    }
                }
            }
            
            // 检查纵向
            for (let x = 0; x < GRID_SIZE; x++) {
                for (let y = 0; y < GRID_SIZE - 2; y++) {
                    const idx = y * GRID_SIZE + x;
                    if (!grid[idx] || !grid[idx + GRID_SIZE] || !grid[idx + GRID_SIZE * 2]) continue;
                    
                    const c1 = grid[idx].color;
                    if (grid[idx + GRID_SIZE].color === c1 && grid[idx + GRID_SIZE * 2].color === c1) {
                        matches.add(idx);
                        matches.add(idx + GRID_SIZE);
                        matches.add(idx + GRID_SIZE * 2);
                    }
                }
            }
            
            return Array.from(matches);
        }
        
        async function processMatches() {
            let combo = 0;
            
            while (true) {
                const matches = findMatches();
                if (matches.length === 0) break;
                
                combo++;
                
                // 更新分数
                const points = matches.length * 10 * combo;
                score += points;
                
                // 更新任务进度
                matches.forEach(idx => {
                    const color = grid[idx].color;
                    if (mission[color] && missionProgress[color] < mission[color]) {
                        missionProgress[color]++;
                    }
                });
                
                // 显示连击
                if (combo > 1) showCombo(combo);
                
                // 消除动画
                matches.forEach(idx => {
                    const cell = document.querySelector(`[data-index="${idx}"] .bubble`);
                    if (cell) {
                        cell.classList.add('removing');
                        createParticles(idx);
                    }
                });
                
                updateUI();
                renderMission();
                await sleep(300);
                
                // 清除并下落
                matches.forEach(idx => grid[idx] = null);
                applyGravity();
                renderGrid();
                
                // 新泡泡动画
                document.querySelectorAll('.bubble').forEach(b => b.classList.add('falling'));
                await sleep(200);
            }
            
            isProcessing = false;
            checkGameEnd();
        }
        
        function applyGravity() {
            for (let x = 0; x < GRID_SIZE; x++) {
                const column = [];
                for (let y = GRID_SIZE - 1; y >= 0; y--) {
                    const idx = y * GRID_SIZE + x;
                    if (grid[idx]) column.push(grid[idx]);
                }
                
                while (column.length < GRID_SIZE) {
                    column.push(createRandomBubble());
                }
                
                for (let y = GRID_SIZE - 1; y >= 0; y--) {
                    const idx = y * GRID_SIZE + x;
                    grid[idx] = column[GRID_SIZE - 1 - y];
                }
            }
        }
        
        function createParticles(cellIndex) {
            const cell = document.querySelector(`[data-index="${cellIndex}"]`);
            if (!cell) return;
            
            const rect = cell.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const color = grid[cellIndex]?.color || 'white';
            const colorMap = { red: '#ff6b6b', blue: '#4ecdc4', green: '#95e1d3', yellow: '#ffd93d', purple: '#a8e6cf' };
            
            for (let i = 0; i < 6; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = 4 + Math.random() * 6;
                const angle = (Math.PI * 2 * i) / 6;
                const velocity = 30 + Math.random() * 50;
                
                particle.style.cssText = `
                    width: ${size}px;
                    height: ${size}px;
                    background: ${colorMap[color]};
                    left: ${centerX}px;
                    top: ${centerY}px;
                    --tx: ${Math.cos(angle) * velocity}px;
                    --ty: ${Math.sin(angle) * velocity}px;
                `;
                
                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 600);
            }
        }
        
        function showCombo(count) {
            const comboText = document.getElementById('comboText');
            comboText.textContent = `${count} 连击!`;
            comboText.classList.remove('show');
            void comboText.offsetWidth;
            comboText.classList.add('show');
        }
        
        function checkGameEnd() {
            const missionComplete = Object.entries(mission).every(([color, target]) => {
                return (missionProgress[color] || 0) >= target;
            });
            
            if (missionComplete) {
                showModal(true);
            } else if (moves <= 0) {
                showModal(false);
            }
        }
        
        function showModal(win) {
            const modal = document.getElementById('modal');
            const icon = document.getElementById('modalIcon');
            const title = document.getElementById('modalTitle');
            const scoreEl = document.getElementById('modalScore');
            const stars = document.getElementById('modalStars');
            const btn = document.getElementById('modalBtn');
            
            if (win) {
                icon.textContent = '🎉';
                title.textContent = '通关!';
                title.className = 'modal-title win';
                
                // 计算星星
                let starCount = 1;
                if (moves >= 5) starCount = 2;
                if (moves >= 10) starCount = 3;
                stars.textContent = '⭐'.repeat(starCount);
                
                btn.textContent = '下一关 →';
                btn.onclick = nextLevel;
            } else {
                icon.textContent = '😢';
                title.textContent = '失败';
                title.className = 'modal-title lose';
                stars.textContent = '';
                btn.textContent = '重试';
                btn.onclick = restartLevel;
            }
            
            scoreEl.textContent = `得分: ${score}`;
            modal.classList.add('show');
        }
        
        function nextLevel() {
            document.getElementById('modal').classList.remove('show');
            level++;
            initLevel();
        }
        
        function restartLevel() {
            document.getElementById('modal').classList.remove('show');
            initLevel();
        }
        
        function showHint() {
            // 找到可能的移动
            for (let i = 0; i < CELL_COUNT; i++) {
                const neighbors = getNeighbors(i);
                for (let neighbor of neighbors) {
                    [grid[i], grid[neighbor]] = [grid[neighbor], grid[i]];
                    const matches = findMatches();
                    [grid[i], grid[neighbor]] = [grid[neighbor], grid[i]];
                    
                    if (matches.length > 0) {
                        const cell = document.querySelector(`[data-index="${i}"] .bubble`);
                        if (cell) {
                            cell.classList.add('hint');
                            setTimeout(() => cell.classList.remove('hint'), 2000);
                        }
                        return;
                    }
                }
            }
        }
        
        function getNeighbors(index) {
            const neighbors = [];
            const x = index % GRID_SIZE;
            const y = Math.floor(index / GRID_SIZE);
            
            if (x > 0) neighbors.push(index - 1);
            if (x < GRID_SIZE - 1) neighbors.push(index + 1);
            if (y > 0) neighbors.push(index - GRID_SIZE);
            if (y < GRID_SIZE - 1) neighbors.push(index + GRID_SIZE);
            
            return neighbors;
        }
        
        function updateUI() {
            document.getElementById('levelNum').textContent = level;
            document.getElementById('score').textContent = score.toLocaleString();
            document.getElementById('moves').textContent = moves;
        }
        
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
        
        // 初始化
        initLevel();
    </script>
</body>
</html>
