<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>泡泡消消乐 Pro - Bubble Match</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --gold: #ffd700;
            --red: #ff6b6b;
            --green: #4caf50;
        }
        
        body {
            background: linear-gradient(180deg, #1a1a2e 0%, #0a0a0f 100%);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            color: #fff;
        }
        
        /* 页面容器 */
        .page {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
            flex-direction: column;
        }
        
        .page.active { display: flex; }
        
        /* 背景动画 */
        .bg-animation {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            overflow: hidden;
            pointer-events: none;
        }
        
        .floating-bubble {
            position: absolute;
            border-radius: 50%;
            opacity: 0.3;
            animation: float 8s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.3; }
            50% { transform: translateY(-30px) rotate(180deg); opacity: 0.6; }
        }
        
        /* ========== 开始页 ========== */
        .start-page {
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at center, #2d2d44 0%, #0a0a0f 70%);
        }
        
        .logo-container {
            text-align: center;
            animation: logoFloat 3s ease-in-out infinite;
        }
        
        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .game-logo {
            font-size: 56px;
            font-weight: 900;
            background: linear-gradient(135deg, #667eea 0%, #ffd700 50%, #ff6b6b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 60px rgba(102, 126, 234, 0.5);
            margin-bottom: 10px;
        }
        
        .game-subtitle {
            font-size: 18px;
            color: rgba(255,255,255,0.6);
            letter-spacing: 10px;
            margin-bottom: 50px;
        }
        
        .mode-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            padding: 0 30px;
            max-width: 400px;
            width: 100%;
        }
        
        .mode-card {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.3) 0%, rgba(118, 75, 162, 0.3) 100%);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .mode-card:hover, .mode-card:active {
            transform: scale(1.05);
            border-color: #ffd700;
            box-shadow: 0 10px 40px rgba(255, 215, 0, 0.3);
        }
        
        .mode-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        
        .mode-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .mode-desc {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
        }
        
        .version-text {
            position: absolute;
            bottom: 30px;
            font-size: 12px;
            color: rgba(255,255,255,0.3);
        }
        
        /* ========== 排行榜页 ========== */
        .rank-page {
            padding: 20px;
            overflow-y: auto;
        }
        
        .rank-header {
            text-align: center;
            padding: 20px 0;
        }
        
        .rank-title {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .rank-tabs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        .rank-tab {
            padding: 10px 25px;
            border: none;
            border-radius: 25px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .rank-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .rank-list {
            max-width: 400px;
            margin: 0 auto;
        }
        
        .rank-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .rank-number {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
        
        .rank-number.top3 {
            background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
        }
        
        .rank-info {
            flex: 1;
        }
        
        .rank-name {
            font-size: 16px;
            font-weight: 600;
        }
        
        .rank-detail {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
        }
        
        .rank-score {
            font-size: 20px;
            font-weight: 700;
            color: #ffd700;
        }
        
        /* ========== 游戏页 ========== */
        .game-page {
            background: linear-gradient(180deg, #1a1a2e 0%, #0a0a0f 100%);
        }
        
        .game-header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }
        
        .back-btn {
            padding: 8px 15px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 20px;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
        }
        
        .game-mode-title {
            font-size: 16px;
            font-weight: 700;
        }
        
        .game-stats {
            display: flex;
            gap: 20px;
            font-size: 14px;
        }
        
        .stat-box {
            text-align: center;
        }
        
        .stat-label {
            font-size: 11px;
            color: rgba(255,255,255,0.6);
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: 700;
        }
        
        .stat-value.score { color: #ffd700; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
        .stat-value.time { color: #ff6b6b; }
        .stat-value.combo { color: #4ecdc4; }
        
        /* 道具栏 */
        .tools-bar {
            padding: 10px 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
            background: rgba(255,255,255,0.03);
        }
        
        .tool-btn {
            width: 60px;
            height: 60px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(135deg, rgba(102,126,234,0.3) 0%, rgba(118,75,162,0.3) 100%);
            border: 2px solid rgba(255,255,255,0.1);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            position: relative;
        }
        
        .tool-btn:hover, .tool-btn.active {
            transform: scale(1.1);
            border-color: #ffd700;
            box-shadow: 0 0 20px rgba(255,215,0,0.3);
        }
        
        .tool-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        .tool-icon {
            font-size: 24px;
        }
        
        .tool-count {
            position: absolute;
            bottom: -5px;
            right: -5px;
            width: 22px;
            height: 22px;
            background: #ff6b6b;
            border-radius: 50%;
            font-size: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .tool-btn.locked::after {
            content: '🔒';
            position: absolute;
            font-size: 20px;
        }
        
        .game-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }
        
        .grid-container {
            position: relative;
            background: rgba(0,0,0,0.2);
            border-radius: 15px;
            padding: 10px;
        }
        
        .bubble-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 4px;
            width: min(85vw, 400px);
            aspect-ratio: 1;
        }
        
        .bubble-cell {
            aspect-ratio: 1;
            position: relative;
            cursor: pointer;
        }
        
        .bubble {
            width: 100%; height: 100%;
            border-radius: 50%;
            position: relative;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: inset -3px -3px 8px rgba(0,0,0,0.3), inset 3px 3px 8px rgba(255,255,255,0.4), 0 4px 10px rgba(0,0,0,0.3);
        }
        
        .bubble::before {
            content: '';
            position: absolute;
            top: 12%; left: 15%;
            width: 30%; height: 25%;
            background: radial-gradient(ellipse, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.3) 60%, transparent 70%);
            border-radius: 50%;
            transform: rotate(-20deg);
        }
        
        /* 特殊泡泡 */
        .bubble.ice {
            background: radial-gradient(circle at 30% 30%, #e0f7fa, #81d4fa);
            border: 2px solid #4fc3f7;
        }
        
        .bubble.ice::after {
            content: '❄️';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 16px;
        }
        
        .bubble.rock {
            background: radial-gradient(circle at 30% 30%, #bcaaa4, #5d4037);
            border: 2px solid #3e2723;
        }
        
        .bubble.rock::after {
            content: '🪨';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 16px;
        }
        
        /* 普通颜色 */
        .bubble-red { background: radial-gradient(circle at 30% 30%, #ff8e8e, #ff6b6b); }
        .bubble-blue { background: radial-gradient(circle at 30% 30%, #7fdbda, #4ecdc4); }
        .bubble-green { background: radial-gradient(circle at 30% 30%, #b8f0e6, #95e1d3); }
        .bubble-yellow { background: radial-gradient(circle at 30% 30%, #ffe566, #ffd93d); }
        .bubble-purple { background: radial-gradient(circle at 30% 30%, #c8f0e4, #a8e6cf); }
        
        .bubble.selected {
            transform: scale(1.15);
            box-shadow: 0 0 20px rgba(255,255,255,0.6), 0 0 40px rgba(255,255,255,0.3);
            animation: selectedPulse 1s ease-in-out infinite;
        }
        
        @keyframes selectedPulse {
            0%, 100% { transform: scale(1.15); }
            50% { transform: scale(1.2); }
        }
        
        .bubble.hint { animation: hintShake 0.5s ease-in-out infinite; }
        @keyframes hintShake {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            25% { transform: translateX(-3px) rotate(-5deg); }
            75% { transform: translateX(3px) rotate(5deg); }
        }
        
        .bubble.removing { animation: popOut 0.3s ease-out forwards; }
        @keyframes popOut {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.8; }
            100% { transform: scale(0); opacity: 0; }
        }
        
        .bubble.falling { animation: fallIn 0.4s ease-out; }
        @keyframes fallIn {
            0% { transform: translateY(-50px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        
        .combo-display {
            position: fixed;
            top: 40%; left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 1000;
            text-align: center;
        }
        
        .combo-text {
            font-size: 72px;
            font-weight: 900;
            background: linear-gradient(135deg, #ffd700 0%, #ff6b6b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0;
        }
        
        .combo-text.show {
            animation: comboShow 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
        }
        
        @keyframes comboShow {
            0% { opacity: 0; transform: scale(0) rotate(-15deg); }
            30% { opacity: 1; transform: scale(1.3) rotate(5deg); }
            60% { opacity: 1; transform: scale(1) rotate(0deg); }
            100% { opacity: 0; transform: scale(0.8) translateY(-30px); }
        }
        
        .particle {
            position: fixed;
            pointer-events: none;
            border-radius: 50%;
            animation: particleFly 0.6s ease-out forwards;
        }
        
        @keyframes particleFly {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }
        
        /* ========== 结算页 ========== */
        .result-page {
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at center, #2d2d44 0%, #0a0a0f 70%);
            padding: 40px;
        }
        
        .result-content {
            text-align: center;
            max-width: 400px;
            animation: resultSlideUp 0.5s ease-out;
        }
        
        @keyframes resultSlideUp {
            0% { transform: translateY(50px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        
        .result-icon {
            font-size: 100px;
            margin-bottom: 20px;
            animation: bounce 1s ease-in-out infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        .result-title {
            font-size: 48px;
            font-weight: 900;
            margin-bottom: 10px;
        }
        
        .result-title.win {
            background: linear-gradient(135deg, #ffd700 0%, #ff6b6b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .result-score {
            font-size: 64px;
            font-weight: 900;
            color: #ffd700;
            margin: 20px 0;
            text-shadow: 0 0 30px rgba(255,215,0,0.5);
        }
        
        .result-stats {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .result-stat-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .result-stat-row:last-child { border-bottom: none; }
        
        .result-stat-name { font-size: 14px; color: rgba(255,255,255,0.6); }
        .result-stat-value { font-size: 20px; font-weight: 700; }
        
        .new-record {
            background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
            color: #000;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 20px;
            display: inline-block;
            animation: recordPulse 1s ease-in-out infinite;
        }
        
        @keyframes recordPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .result-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .result-btn {
            padding: 18px 40px;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .result-btn.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .result-btn.secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 2px solid rgba(255,255,255,0.2);
        }
        
        .result-btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <!-- 背景动画 -->
    <div class="bg-animation" id="bgAnimation"></div>
    
    <!-- 开始页 -->
    <div class="page start-page active" id="startPage">
        <div class="logo-container">
            <div class="game-logo">🫧 泡泡消消乐</div>
            <div class="game-subtitle">PRO EDITION</div>
        </div>
        
        <div class="mode-grid">
            <div class="mode-card" onclick="startMode('classic')">
                <div class="mode-icon">🎯</div>
                <div class="mode-name">经典模式</div>
                <div class="mode-desc">完成任务通关</div>
            </div>
            <div class="mode-card" onclick="startMode('time')">
                <div class="mode-icon">⚡</div>
                <div class="mode-name">限时挑战</div>
                <div class="mode-desc">60秒极速消除</div>
            </div>
            <div class="mode-card" onclick="startMode('endless')">
                <div class="mode-icon">♾️</div>
                <div class="mode-name">无尽模式</div>
                <div class="mode-desc">挑战最高分</div>
            </div>
            <div class="mode-card" onclick="showRank()">
                <div class="mode-icon">🏆</div>
                <div class="mode-name">排行榜</div>
                <div class="mode-desc">查看最高分</div>
            </div>
        </div>
        
        <div class="version-text">Version 2.0 Pro</div>
    </div>
    
    <!-- 排行榜页 -->
    <div class="page rank-page" id="rankPage">
        <div class="rank-header">
            <div class="rank-title">🏆 排行榜</div>
        </div>
        
        <div class="rank-tabs">
            <button class="rank-tab active" onclick="switchRankTab('classic')">经典</button>
            <button class="rank-tab" onclick="switchRankTab('time')">限时</button>
            <button class="rank-tab" onclick="switchRankTab('endless')">无尽</button>
        </div>
        
        <div class="rank-list" id="rankList"></div>
        
        <div class="menu-footer">
            <button class="menu-btn" onclick="showStart()">← 返回</button>
        </div>
    </div>
    
    <!-- 游戏页 -->
    <div class="page game-page" id="gamePage">
        <div class="game-header">
            <button class="back-btn" onclick="showStart()">← 退出</button>
            <div class="game-mode-title" id="gameModeTitle">经典模式</div>
            <div class="game-stats">
                <div class="stat-box">
                    <div class="stat-label">得分</div>
                    <div class="stat-value score" id="scoreDisplay">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label" id="timeLabel">剩余步数</div>
                    <div class="stat-value time" id="timeDisplay">20</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">连击</div>
                    <div class="stat-value combo" id="comboDisplay">0</div>
                </div>
            </div>
        </div>
        
        <!-- 道具栏 -->
        <div class="tools-bar" id="toolsBar">
            <button class="tool-btn" id="toolBomb" onclick="useTool('bomb')" title="炸弹：消除3x3区域">
                <span class="tool-icon">💣</span>
                <span class="tool-count" id="countBomb">3</span>
            </button>
            <button class="tool-btn" id="toolHammer" onclick="useTool('hammer')" title="锤子：消除单个">
                <span class="tool-icon">🔨</span>
                <span class="tool-count" id="countHammer">3</span>
            </button>
            <button class="tool-btn" id="toolRainbow" onclick="useTool('rainbow')" title="彩虹球：消除同色">
                <span class="tool-icon">🌈</span>
                <span class="tool-count" id="countRainbow">2</span>
            </button>
            <button class="tool-btn" id="toolShuffle" onclick="useTool('shuffle')" title="刷新：重置棋盘">
                <span class="tool-icon">🔄</span>
                <span class="tool-count" id="countShuffle">2</span>
            </button>
        </div>
        
        <div class="game-area">
            <div class="grid-container">
                <div class="bubble-grid" id="grid"></div>
            </div>
        </div>
        
        <div class="combo-display">
            <div class="combo-text" id="comboText"></div>
        </div>
    </div>
    
    <!-- 结算页 -->
    <div class="page result-page" id="resultPage">
        <div class="result-content">
            <div class="result-icon" id="resultIcon">🎉</div>
            <div class="result-title win" id="resultTitle">游戏结束</div>
            
            <div class="new-record" id="newRecordBadge" style="display:none;">🏆 新纪录!</div>
            
            <div class="result-score" id="finalScore">0</div>
            
            <div class="result-stats">
                <div class="result-stat-row">
                    <span class="result-stat-name">最高连击</span>
                    <span class="result-stat-value" id="finalMaxCombo">0</span>
                </div>
                <div class="result-stat-row">
                    <span class="result-stat-name">消除次数</span>
                    <span class="result-stat-value" id="finalMatches">0</span>
                </div>
                <div class="result-stat-row">
                    <span class="result-stat-name">使用道具</span>
                    <span class="result-stat-value" id="finalTools">0</span>
                </div>
            </div>
            
            <div class="result-buttons">
                <button class="result-btn primary" onclick="restartGame()">🔄 再玩一次</button>
                <button class="result-btn secondary" onclick="showStart()">📋 主菜单</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== 游戏配置 ====================
        const COLORS = ['red', 'blue', 'green', 'yellow', 'purple'];
        const GRID_SIZE = 8;
        const CELL_COUNT = GRID_SIZE * GRID_SIZE;
        
        // 游戏状态
        let gameState = {
            mode: 'classic', // classic, time, endless
            grid: [],
            selectedCell: null,
            score: 0,
            moves: 0,
            timeLeft: 0,
            combo: 0,
            maxCombo: 0,
            matches: 0,
            toolsUsed: 0,
            isProcessing: false,
            activeTool: null,
            timerInterval: null,
            tools: { bomb: 3, hammer: 3, rainbow: 2, shuffle: 2 }
        };
        
        // 排行榜数据
        let rankings = {
            classic: [],
            time: [],
            endless: []
        };
        
        // ==================== 初始化 ====================
        function init() {
            loadRankings();
            createBgBubbles();
        }
        
        function createBgBubbles() {
            const container = document.getElementById('bgAnimation');
            const colors = ['#667eea', '#764ba2', '#ffd700', '#ff6b6b'];
            for (let i = 0; i < 15; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'floating-bubble';
                const size = 20 + Math.random() * 60;
                bubble.style.cssText = `width:${size}px;height:${size}px;background:${colors[Math.floor(Math.random()*colors.length)]};left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*5}s;animation-duration:${6+Math.random()*4}s;`;
                container.appendChild(bubble);
            }
        }
        
        // ==================== 页面切换 ====================
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }
        
        function showStart() { 
            clearInterval(gameState.timerInterval);
            showPage('startPage'); 
        }
        function showRank() { 
            renderRankList('classic');
            showPage('rankPage'); 
        }
        
        // ==================== 模式选择 ====================
        function startMode(mode) {
            gameState.mode = mode;
            gameState.score = 0;
            gameState.combo = 0;
            gameState.maxCombo = 0;
            gameState.matches = 0;
            gameState.toolsUsed = 0;
            gameState.activeTool = null;
            gameState.tools = { bomb: 3, hammer: 3, rainbow: 2, shuffle: 2 };
            
            // 设置模式参数
            if (mode === 'classic') {
                gameState.moves = 30;
                gameState.timeLeft = 0;
                document.getElementById('timeLabel').textContent = '剩余步数';
                document.getElementById('timeDisplay').textContent = '30';
            } else if (mode === 'time') {
                gameState.moves = 9999;
                gameState.timeLeft = 60;
                document.getElementById('timeLabel').textContent = '剩余时间';
                document.getElementById('timeDisplay').textContent = '60s';
            } else if (mode === 'endless') {
                gameState.moves = 50;
                gameState.timeLeft = 0;
                document.getElementById('timeLabel').textContent = '剩余步数';
                document.getElementById('timeDisplay').textContent = '50';
            }
            
            const modeNames = { classic: '经典模式', time: '限时挑战', endless: '无尽模式' };
            document.getElementById('gameModeTitle').textContent = modeNames[mode];
            
            updateToolsUI();
            updateUI();
            initGrid();
            showPage('gamePage');
            
            // 启动计时器（限时模式）
            if (mode === 'time') {
                gameState.timerInterval = setInterval(() => {
                    gameState.timeLeft--;
                    document.getElementById('timeDisplay').textContent = gameState.timeLeft + 's';
                    if (gameState.timeLeft <= 0) {
                        gameOver();
                    }
                }, 1000);
            }
        }
        
        // ==================== 游戏核心 ====================
        function initGrid() {
            gameState.grid = [];
            for (let i = 0; i < CELL_COUNT; i++) {
                gameState.grid.push(createRandomBubble());
            }
            // 确保初始无匹配
            while (findMatches().length > 0) {
                gameState.grid = [];
                for (let i = 0; i < CELL_COUNT; i++) {
                    gameState.grid.push(createRandomBubble());
                }
            }
            renderGrid();
        }
        
        function createRandomBubble() {
            const rand = Math.random();
            // 10%概率生成障碍物
            if (rand < 0.05) return { type: 'ice', color: 'ice', hp: 2 };
            if (rand < 0.1) return { type: 'rock', color: 'rock', hp: 1 };
            return { type: 'normal', color: COLORS[Math.floor(Math.random() * COLORS.length)] };
        }
        
        function renderGrid() {
            const gridEl = document.getElementById('grid');
            gridEl.innerHTML = '';
            
            gameState.grid.forEach((cell, index) => {
                const cellEl = document.createElement('div');
                cellEl.className = 'bubble-cell';
                cellEl.dataset.index = index;
                
                if (cell) {
                    const bubble = document.createElement('div');
                    let className = 'bubble';
                    if (cell.type === 'ice') className += ' ice';
                    else if (cell.type === 'rock') className += ' rock';
                    else className += ` bubble-${cell.color}`;
                    
                    if (index === gameState.selectedCell) className += ' selected';
                    bubble.className = className;
                    cellEl.appendChild(bubble);
                }
                
                cellEl.addEventListener('click', () => onCellClick(index));
                gridEl.appendChild(cellEl);
            });
        }
        
        function onCellClick(index) {
            if (gameState.isProcessing || !gameState.grid[index]) return;
            
            // 使用道具
            if (gameState.activeTool) {
                useToolOnCell(index);
                return;
            }
            
            // 正常交换
            if (gameState.selectedCell === null) {
                gameState.selectedCell = index;
                renderGrid();
            } else if (gameState.selectedCell === index) {
                gameState.selectedCell = null;
                renderGrid();
            } else if (isAdjacent(gameState.selectedCell, index)) {
                trySwap(gameState.selectedCell, index);
            } else {
                gameState.selectedCell = index;
                renderGrid();
            }
        }
        
        function isAdjacent(a, b) {
            const ax = a % GRID_SIZE, ay = Math.floor(a / GRID_SIZE);
            const bx = b % GRID_SIZE, by = Math.floor(b / GRID_SIZE);
            return Math.abs(ax - bx) + Math.abs(ay - by) === 1;
        }
        
        async function trySwap(a, b) {
            gameState.isProcessing = true;
            gameState.selectedCell = null;
            
            [gameState.grid[a], gameState.grid[b]] = [gameState.grid[b], gameState.grid[a]];
            renderGrid();
            
            const matches = findMatches();
            
            if (matches.length === 0) {
                await sleep(200);
                [gameState.grid[a], gameState.grid[b]] = [gameState.grid[b], gameState.grid[a]];
                renderGrid();
                gameState.isProcessing = false;
            } else {
                // 扣除步数
                if (gameState.mode !== 'time') {
                    gameState.moves--;
                    document.getElementById('timeDisplay').textContent = gameState.moves;
                }
                await processMatches();
                checkGameEnd();
            }
        }
        
        function findMatches() {
            const matches = new Set();
            
            // 横向
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE - 2; x++) {
                    const idx = y * GRID_SIZE + x;
                    if (!gameState.grid[idx] || !gameState.grid[idx+1] || !gameState.grid[idx+2]) continue;
                    if (gameState.grid[idx].type !== 'normal' || gameState.grid[idx+1].type !== 'normal' || gameState.grid[idx+2].type !== 'normal') continue;
                    
                    const c1 = gameState.grid[idx].color;
                    if (gameState.grid[idx+1].color === c1 && gameState.grid[idx+2].color === c1) {
                        matches.add(idx); matches.add(idx+1); matches.add(idx+2);
                    }
                }
            }
            
            // 纵向
            for (let x = 0; x < GRID_SIZE; x++) {
                for (let y = 0; y < GRID_SIZE - 2; y++) {
                    const idx = y * GRID_SIZE + x;
                    if (!gameState.grid[idx] || !gameState.grid[idx+GRID_SIZE] || !gameState.grid[idx+GRID_SIZE*2]) continue;
                    if (gameState.grid[idx].type !== 'normal' || gameState.grid[idx+GRID_SIZE].type !== 'normal' || gameState.grid[idx+GRID_SIZE*2].type !== 'normal') continue;
                    
                    const c1 = gameState.grid[idx].color;
                    if (gameState.grid[idx+GRID_SIZE].color === c1 && gameState.grid[idx+GRID_SIZE*2].color === c1) {
                        matches.add(idx); matches.add(idx+GRID_SIZE); matches.add(idx+GRID_SIZE*2);
                    }
                }
            }
            
            return Array.from(matches);
        }
        
        async function processMatches() {
            while (true) {
                const matches = findMatches();
                if (matches.length === 0) break;
                
                gameState.combo++;
                if (gameState.combo > gameState.maxCombo) gameState.maxCombo = gameState.combo;
                gameState.matches++;
                
                const points = matches.length * 10 * gameState.combo;
                gameState.score += points;
                
                if (gameState.combo > 1) showCombo(gameState.combo);
                
                // 消除动画
                matches.forEach(idx => {
                    const cell = document.querySelector(`[data-index="${idx}"] .bubble`);
                    if (cell) {
                        cell.classList.add('removing');
                        createParticles(idx);
                    }
                });
                
                updateUI();
                await sleep(300);
                
                // 清除并下落
                matches.forEach(idx => gameState.grid[idx] = null);
                applyGravity();
                renderGrid();
                
                document.querySelectorAll('.bubble').forEach(b => b.classList.add('falling'));
                await sleep(200);
            }
            
            gameState.combo = 0;
            gameState.isProcessing = false;
        }
        
        function applyGravity() {
            for (let x = 0; x < GRID_SIZE; x++) {
                const column = [];
                for (let y = GRID_SIZE - 1; y >= 0; y--) {
                    const idx = y * GRID_SIZE + x;
                    if (gameState.grid[idx]) column.push(gameState.grid[idx]);
                }
                while (column.length < GRID_SIZE) column.push(createRandomBubble());
                for (let y = GRID_SIZE - 1; y >= 0; y--) {
                    gameState.grid[y * GRID_SIZE + x] = column[GRID_SIZE - 1 - y];
                }
            }
        }
        
        // ==================== 道具系统 ====================
        function useTool(tool) {
            if (gameState.tools[tool] <= 0 || gameState.isProcessing) return;
            
            gameState.activeTool = tool;
            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tool${tool.charAt(0).toUpperCase() + tool.slice(1)}`).classList.add('active');
        }
        
        function useToolOnCell(index) {
            const tool = gameState.activeTool;
            if (!tool || gameState.tools[tool] <= 0) return;
            
            gameState.tools[tool]--;
            gameState.toolsUsed++;
            updateToolsUI();
            
            let toRemove = [];
            
            if (tool === 'bomb') {
                // 炸弹：消除3x3
                const x = index % GRID_SIZE;
                const y = Math.floor(index / GRID_SIZE);
                for (let dy = -1; dy <= 1; dy++) {
                    for (let dx = -1; dx <= 1; dx++) {
                        const nx = x + dx, ny = y + dy;
                        if (nx >= 0 && nx < GRID_SIZE && ny >= 0 && ny < GRID_SIZE) {
                            toRemove.push(ny * GRID_SIZE + nx);
                        }
                    }
                }
                gameState.score += toRemove.length * 20;
            } else if (tool === 'hammer') {
                // 锤子：消除单个
                toRemove.push(index);
                gameState.score += 10;
            } else if (tool === 'rainbow') {
                // 彩虹球：消除同色
                const targetColor = gameState.grid[index]?.color;
                if (targetColor) {
                    gameState.grid.forEach((cell, idx) => {
                        if (cell && cell.color === targetColor) toRemove.push(idx);
                    });
                    gameState.score += toRemove.length * 15;
                }
            } else if (tool === 'shuffle') {
                // 刷新：重置棋盘
                initGrid();
                gameState.activeTool = null;
                document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
                return;
            }
            
            // 执行消除
            if (toRemove.length > 0) {
                toRemove.forEach(idx => {
                    const cell = document.querySelector(`[data-index="${idx}"] .bubble`);
                    if (cell) {
                        cell.classList.add('removing');
                        createParticles(idx);
                    }
                });
                
                setTimeout(() => {
                    toRemove.forEach(idx => gameState.grid[idx] = null);
                    applyGravity();
                    renderGrid();
                }, 300);
            }
            
            gameState.activeTool = null;
            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
            updateUI();
        }
        
        function updateToolsUI() {
            document.getElementById('countBomb').textContent = gameState.tools.bomb;
            document.getElementById('countHammer').textContent = gameState.tools.hammer;
            document.getElementById('countRainbow').textContent = gameState.tools.rainbow;
            document.getElementById('countShuffle').textContent = gameState.tools.shuffle;
            
            ['bomb', 'hammer', 'rainbow', 'shuffle'].forEach(tool => {
                const btn = document.getElementById(`tool${tool.charAt(0).toUpperCase() + tool.slice(1)}`);
                btn.disabled = gameState.tools[tool] <= 0;
            });
        }
        
        // ==================== 游戏结束 ====================
        function checkGameEnd() {
            if (gameState.mode === 'time') {
                // 限时模式：时间到才结束
                return;
            }
            
            if (gameState.moves <= 0) {
                // 检查是否还有可消除的
                let hasMove = false;
                for (let i = 0; i < CELL_COUNT; i++) {
                    const neighbors = getNeighbors(i);
                    for (let neighbor of neighbors) {
                        [gameState.grid[i], gameState.grid[neighbor]] = [gameState.grid[neighbor], gameState.grid[i]];
                        const matches = findMatches();
                        [gameState.grid[i], gameState.grid[neighbor]] = [gameState.grid[neighbor], gameState.grid[i]];
                        if (matches.length > 0) { hasMove = true; break; }
                    }
                    if (hasMove) break;
                }
                
                if (!hasMove || gameState.mode === 'classic') {
                    gameOver();
                }
            }
        }
        
        function gameOver() {
            clearInterval(gameState.timerInterval);
            
            // 保存排行榜
            const record = {
                score: gameState.score,
                maxCombo: gameState.maxCombo,
                matches: gameState.matches,
                date: new Date().toLocaleDateString()
            };
            
            rankings[gameState.mode].push(record);
            rankings[gameState.mode].sort((a, b) => b.score - a.score);
            rankings[gameState.mode] = rankings[gameState.mode].slice(0, 10);
            saveRankings();
            
            // 显示结果
            document.getElementById('finalScore').textContent = gameState.score.toLocaleString();
            document.getElementById('finalMaxCombo').textContent = gameState.maxCombo;
            document.getElementById('finalMatches').textContent = gameState.matches;
            document.getElementById('finalTools').textContent = gameState.toolsUsed;
            
            // 检查是否新纪录
            const isNewRecord = rankings[gameState.mode][0]?.score === gameState.score;
            document.getElementById('newRecordBadge').style.display = isNewRecord ? 'inline-block' : 'none';
            
            showPage('resultPage');
        }
        
        function restartGame() {
            startMode(gameState.mode);
        }
        
        // ==================== 排行榜 ====================
        function switchRankTab(mode) {
            document.querySelectorAll('.rank-tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            renderRankList(mode);
        }
        
        function renderRankList(mode) {
            const list = document.getElementById('rankList');
            list.innerHTML = '';
            
            const data = rankings[mode] || [];
            if (data.length === 0) {
                list.innerHTML = '<div style="text-align:center;padding:40px;color:rgba(255,255,255,0.5);">暂无记录</div>';
                return;
            }
            
            data.forEach((record, i) => {
                const item = document.createElement('div');
                item.className = 'rank-item';
                item.innerHTML = `
                    <div class="rank-number ${i < 3 ? 'top3' : ''}">${i + 1}</div>
                    <div class="rank-info">
                        <div class="rank-name">${record.date}</div>
                        <div class="rank-detail">连击${record.maxCombo} · 消除${record.matches}次</div>
                    </div>
                    <div class="rank-score">${record.score.toLocaleString()}</div>
                `;
                list.appendChild(item);
            });
        }
        
        // ==================== 工具函数 ====================
        function createParticles(cellIndex) {
            const cell = document.querySelector(`[data-index="${cellIndex}"]`);
            if (!cell) return;
            const rect = cell.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const colorMap = { red: '#ff6b6b', blue: '#4ecdc4', green: '#95e1d3', yellow: '#ffd93d', purple: '#a8e6cf', ice: '#81d4fa', rock: '#bcaaa4' };
            const color = gameState.grid[cellIndex]?.color || 'red';
            
            for (let i = 0; i < 6; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = 4 + Math.random() * 6;
                const angle = (Math.PI * 2 * i) / 6;
                const velocity = 30 + Math.random() * 50;
                particle.style.cssText = `width:${size}px;height:${size}px;background:${colorMap[color]};left:${centerX}px;top:${centerY}px;--tx:${Math.cos(angle)*velocity}px;--ty:${Math.sin(angle)*velocity}px;`;
                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 600);
            }
        }
        
        function showCombo(count) {
            const comboText = document.getElementById('comboText');
            comboText.textContent = `${count} 连击!`;
            comboText.classList.remove('show');
            void comboText.offsetWidth;
            comboText.classList.add('show');
        }
        
        function getNeighbors(index) {
            const neighbors = [];
            const x = index % GRID_SIZE, y = Math.floor(index / GRID_SIZE);
            if (x > 0) neighbors.push(index - 1);
            if (x < GRID_SIZE - 1) neighbors.push(index + 1);
            if (y > 0) neighbors.push(index - GRID_SIZE);
            if (y < GRID_SIZE - 1) neighbors.push(index + GRID_SIZE);
            return neighbors;
        }
        
        function updateUI() {
            document.getElementById('scoreDisplay').textContent = gameState.score.toLocaleString();
            document.getElementById('comboDisplay').textContent = gameState.combo;
        }
        
        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
        
        function saveRankings() {
            localStorage.setItem('bubbleMatchProRankings', JSON.stringify(rankings));
        }
        
        function loadRankings() {
            const saved = localStorage.getItem('bubbleMatchProRankings');
            if (saved) rankings = JSON.parse(saved);
        }
        
        // 启动
        init();
    </script>
</body>
</html>
