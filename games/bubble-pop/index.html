<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>泡泡纸 Pro - Bubble Wrap Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --bg-dark: #0a0a0f;
            --bg-light: #1a1a2e;
            --accent: #667eea;
            --gold: #ffd700;
        }
        
        body {
            background: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            position: relative;
        }
        
        /* 动态背景 */
        .bg-gradient {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 80%, rgba(102, 126, 234, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(255, 215, 0, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(118, 75, 162, 0.1) 0%, transparent 70%);
            animation: bgPulse 8s ease-in-out infinite;
            pointer-events: none;
        }
        
        @keyframes bgPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }
        
        /* 顶部状态栏 */
        .status-bar {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            z-index: 100;
        }
        
        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        
        .stat-label {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 20px currentColor;
        }
        
        .stat-value.gold { color: var(--gold); }
        .stat-value.combo { 
            color: #ff6b6b; 
            animation: comboPulse 0.3s ease-out;
        }
        
        @keyframes comboPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        
        /* 连击显示 */
        .combo-display {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 1000;
            text-align: center;
        }
        
        .combo-text {
            font-size: 72px;
            font-weight: 900;
            background: linear-gradient(135deg, #ffd700 0%, #ff6b6b 50%, #ffd700 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            transform: scale(0);
            text-shadow: 0 0 60px rgba(255, 215, 0, 0.5);
        }
        
        .combo-text.show {
            animation: comboShow 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
        }
        
        @keyframes comboShow {
            0% { opacity: 0; transform: scale(0) rotate(-10deg); }
            30% { opacity: 1; transform: scale(1.2) rotate(5deg); }
            60% { opacity: 1; transform: scale(1) rotate(0deg); }
            100% { opacity: 0; transform: scale(0.8) translateY(-50px); }
        }
        
        .combo-label {
            font-size: 18px;
            color: rgba(255,255,255,0.8);
            letter-spacing: 8px;
            text-transform: uppercase;
            opacity: 0;
        }
        
        .combo-label.show {
            animation: labelShow 0.8s ease-out forwards;
        }
        
        @keyframes labelShow {
            0%, 60% { opacity: 0; transform: translateY(10px); }
            70% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-10px); }
        }
        
        /* 泡泡网格 */
        .bubble-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            perspective: 1000px;
        }
        
        .bubble-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            padding: 20px;
            background: rgba(255,255,255,0.02);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            transform-style: preserve-3d;
        }
        
        /* 3D 泡泡 */
        .bubble-wrapper {
            width: 60px;
            height: 60px;
            position: relative;
            transform-style: preserve-3d;
        }
        
        .bubble {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.15s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            background: 
                radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.4) 20%, transparent 40%),
                radial-gradient(circle at 70% 70%, rgba(0,0,0,0.1) 0%, transparent 50%),
                linear-gradient(135deg, rgba(102, 126, 234, 0.8) 0%, rgba(118, 75, 162, 0.9) 100%);
            box-shadow: 
                inset -5px -5px 15px rgba(0,0,0,0.3),
                inset 5px 5px 15px rgba(255,255,255,0.4),
                0 8px 25px rgba(102, 126, 234, 0.3),
                0 0 0 1px rgba(255,255,255,0.1);
        }
        
        .bubble::before {
            content: '';
            position: absolute;
            top: 8%; left: 12%;
            width: 25%; height: 20%;
            background: radial-gradient(ellipse, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.6) 40%, transparent 70%);
            border-radius: 50%;
            transform: rotate(-15deg);
            filter: blur(0.5px);
        }
        
        .bubble::after {
            content: '';
            position: absolute;
            bottom: 15%; right: 15%;
            width: 15%; height: 15%;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            filter: blur(1px);
        }
        
        /* 按下凹陷效果 */
        .bubble.pressing {
            transform: scale(0.85) translateZ(-10px);
            box-shadow: 
                inset -8px -8px 20px rgba(0,0,0,0.4),
                inset 8px 8px 20px rgba(255,255,255,0.2),
                0 4px 10px rgba(102, 126, 234, 0.2);
        }
        
        /* 破裂状态 */
        .bubble.popped {
            transform: scale(0.6);
            opacity: 0;
            pointer-events: none;
            transition: all 0.2s ease-out;
        }
        
        /* 破裂后的凹坑 */
        .bubble-dent {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border-radius: 50%;
            background: 
                radial-gradient(circle at 50% 50%, rgba(0,0,0,0.3) 0%, transparent 60%),
                linear-gradient(135deg, #2d2d44 0%, #1a1a2e 100%);
            box-shadow: 
                inset 3px 3px 10px rgba(0,0,0,0.5),
                inset -2px -2px 5px rgba(255,255,255,0.05);
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.3s ease-out;
        }
        
        .bubble-dent.show {
            opacity: 1;
            transform: scale(1);
        }
        
        /* 金色泡泡 */
        .bubble.golden {
            background: 
                radial-gradient(circle at 30% 30%, rgba(255,255,255,0.95) 0%, rgba(255,215,0,0.6) 20%, transparent 40%),
                linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
            box-shadow: 
                inset -5px -5px 15px rgba(0,0,0,0.2),
                inset 5px 5px 15px rgba(255,255,255,0.5),
                0 0 30px rgba(255, 215, 0, 0.5),
                0 8px 25px rgba(255, 140, 0, 0.4);
            animation: goldGlow 2s ease-in-out infinite;
        }
        
        @keyframes goldGlow {
            0%, 100% { box-shadow: inset -5px -5px 15px rgba(0,0,0,0.2), inset 5px 5px 15px rgba(255,255,255,0.5), 0 0 30px rgba(255, 215, 0, 0.5), 0 8px 25px rgba(255, 140, 0, 0.4); }
            50% { box-shadow: inset -5px -5px 15px rgba(0,0,0,0.2), inset 5px 5px 15px rgba(255,255,255,0.5), 0 0 50px rgba(255, 215, 0, 0.8), 0 8px 25px rgba(255, 140, 0, 0.6); }
        }
        
        /* 粒子效果 */
        .particle {
            position: fixed;
            pointer-events: none;
            border-radius: 50%;
            animation: particleFly 0.6s ease-out forwards;
        }
        
        @keyframes particleFly {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(0);
                opacity: 0;
            }
        }
        
        /* 底部控制栏 */
        .controls {
            padding: 20px;
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        
        .control-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .control-btn.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
        }
        
        .control-btn.secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .control-btn:hover {
            transform: translateY(-3px) scale(1.02);
        }
        
        .control-btn:active {
            transform: translateY(-1px) scale(0.98);
        }
        
        /* 音效开关 */
        .sound-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            z-index: 200;
        }
        
        .sound-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.1);
        }
        
        /* 主题选择器 */
        .theme-selector {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            padding: 15px;
            border-radius: 50px;
            display: flex;
            gap: 10px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease-out;
            z-index: 300;
        }
        
        .theme-selector.show {
            opacity: 1;
            pointer-events: all;
            transform: translateX(-50%) translateY(0);
        }
        
        .theme-dot {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.2s;
            position: relative;
        }
        
        .theme-dot:hover {
            transform: scale(1.15);
        }
        
        .theme-dot.active {
            border-color: #fff;
            box-shadow: 0 0 20px currentColor;
        }
        
        .theme-dot::after {
            content: '✓';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 16px;
            opacity: 0;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }
        
        .theme-dot.active::after {
            opacity: 1;
        }
        
        /* 响应式 */
        @media (max-width: 400px) {
            .bubble-wrapper { width: 50px; height: 50px; }
            .bubble-grid { gap: 8px; padding: 15px; }
            .stat-value { font-size: 18px; }
        }
        
        /* 震动效果（设备支持时） */
        @media (prefers-reduced-motion: no-preference) {
            .bubble.pop-effect {
                animation: shake 0.1s ease-in-out;
            }
            
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-2px); }
                75% { transform: translateX(2px); }
            }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    
    <button class="sound-btn" id="soundBtn">🔊</button>
    
    <div class="status-bar">
        <div class="stat-item">
            <span class="stat-label">已戳破</span>
            <span class="stat-value" id="popCount">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">连击</span>
            <span class="stat-value combo" id="comboCount">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">金币</span>
            <span class="stat-value gold" id="coinCount">0</span>
        </div>
    </div>
    
    <div class="combo-display">
        <div class="combo-text" id="comboText">10</div>
        <div class="combo-label" id="comboLabel">连击!</div>
    </div>
    
    <div class="bubble-container">
        <div class="bubble-grid" id="bubbleGrid"></div>
    </div>
    
    <div class="theme-selector" id="themeSelector">
        <div class="theme-dot active" data-theme="0" style="background: linear-gradient(135deg, #667eea, #764ba2)"></div>
        <div class="theme-dot" data-theme="1" style="background: linear-gradient(135deg, #f093fb, #f5576c)"></div>
        <div class="theme-dot" data-theme="2" style="background: linear-gradient(135deg, #4facfe, #00f2fe)"></div>
        <div class="theme-dot" data-theme="3" style="background: linear-gradient(135deg, #43e97b, #38f9d7)"></div>
        <div class="theme-dot" data-theme="4" style="background: linear-gradient(135deg, #fa709a, #fee140)"></div>
    </div>
    
    <div class="controls">
        <button class="control-btn secondary" onclick="resetGrid()">🔄 重置</button>
        <button class="control-btn primary" onclick="autoPop()">▶️ 自动解压</button>
        <button class="control-btn secondary" onclick="toggleTheme()">🎨 主题</button>
    </div>

    <script>
        // 游戏状态
        const state = {
            popCount: 0,
            combo: 0,
            coins: 0,
            soundEnabled: true,
            lastPopTime: 0,
            currentTheme: 0,
            isAutoPopping: false
        };
        
        // 主题配置
        const themes = [
            { name: '梦幻紫', primary: '#667eea', secondary: '#764ba2' },
            { name: '樱花粉', primary: '#f093fb', secondary: '#f5576c' },
            { name: '天空蓝', primary: '#4facfe', secondary: '#00f2fe' },
            { name: '薄荷绿', primary: '#43e97b', secondary: '#38f9d7' },
            { name: '夕阳橙', primary: '#fa709a', secondary: '#fee140' }
        ];
        
        // DOM 元素
        const grid = document.getElementById('bubbleGrid');
        const popCountEl = document.getElementById('popCount');
        const comboCountEl = document.getElementById('comboCount');
        const coinCountEl = document.getElementById('coinCount');
        const comboText = document.getElementById('comboText');
        const comboLabel = document.getElementById('comboLabel');
        const soundBtn = document.getElementById('soundBtn');
        const themeSelector = document.getElementById('themeSelector');
        
        // 音频上下文
        let audioCtx;
        
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }
        
        // 播放音效 - 物理模拟真实泡泡声
        function playPopSound(x = 0.5, y = 0.5) {
            if (!state.soundEnabled || !audioCtx) return;
            
            const t = audioCtx.currentTime;
            
            // 主振荡器 - 爆破音
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();
            
            osc.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);
            
            // 频率快速下降模拟空气释放
            osc.frequency.setValueAtTime(800 + Math.random() * 200, t);
            osc.frequency.exponentialRampToValueAtTime(100, t + 0.08);
            
            // 低通滤波让声音更闷更像泡泡
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(3000, t);
            filter.frequency.exponentialRampToValueAtTime(500, t + 0.1);
            
            // 音量包络
            gain.gain.setValueAtTime(0, t);
            gain.gain.linearRampToValueAtTime(0.4, t + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.01, t + 0.12);
            
            osc.start(t);
            osc.stop(t + 0.15);
            
            // 立体声定位
            const panner = audioCtx.createStereoPanner();
            panner.pan.value = (x - 0.5) * 2;
            gain.disconnect();
            gain.connect(panner);
            panner.connect(audioCtx.destination);
        }
        
        // 播放连击音效
        function playComboSound(combo) {
            if (!state.soundEnabled || !audioCtx) return;
            
            const t = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            // 连击数越高音调越高
            const baseFreq = 400 + Math.min(combo * 50, 800);
            osc.frequency.setValueAtTime(baseFreq, t);
            osc.frequency.exponentialRampToValueAtTime(baseFreq * 2, t + 0.1);
            
            gain.gain.setValueAtTime(0.3, t);
            gain.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
            
            osc.start(t);
            osc.stop(t + 0.3);
        }
        
        // 创建粒子效果
        function createParticles(x, y, color) {
            const count = 6 + Math.floor(Math.random() * 4);
            
            for (let i = 0; i < count; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                const size = 3 + Math.random() * 5;
                const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
                const velocity = 30 + Math.random() * 50;
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity - 20;
                
                particle.style.cssText = `
                    width: ${size}px;
                    height: ${size}px;
                    background: ${color};
                    left: ${x}px;
                    top: ${y}px;
                    --tx: ${tx}px;
                    --ty: ${ty}px;
                    box-shadow: 0 0 ${size}px ${color};
                `;
                
                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 600);
            }
        }
        
        // 创建泡泡
        function createBubble(index) {
            const wrapper = document.createElement('div');
            wrapper.className = 'bubble-wrapper';
            wrapper.dataset.index = index;
            
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            
            // 8% 概率金色泡泡
            if (Math.random() < 0.08) {
                bubble.classList.add('golden');
                wrapper.dataset.golden = 'true';
            }
            
            const dent = document.createElement('div');
            dent.className = 'bubble-dent';
            
            wrapper.appendChild(dent);
            wrapper.appendChild(bubble);
            
            // 触摸/鼠标事件
            let pressTimer;
            let isPressing = false;
            
            const startPress = (e) => {
                e.preventDefault();
                if (bubble.classList.contains('popped')) return;
                
                initAudio();
                isPressing = true;
                bubble.classList.add('pressing');
                
                // 长按蓄力效果（可选）
                pressTimer = setTimeout(() => {
                    if (isPressing) {
                        popBubble(wrapper, e);
                    }
                }, 150);
            };
            
            const endPress = (e) => {
                if (!isPressing) return;
                isPressing = false;
                clearTimeout(pressTimer);
                bubble.classList.remove('pressing');
                
                if (!bubble.classList.contains('popped')) {
                    popBubble(wrapper, e);
                }
            };
            
            bubble.addEventListener('mousedown', startPress);
            bubble.addEventListener('touchstart', startPress, { passive: false });
            bubble.addEventListener('mouseup', endPress);
            bubble.addEventListener('touchend', endPress);
            bubble.addEventListener('mouseleave', () => {
                isPressing = false;
                clearTimeout(pressTimer);
                bubble.classList.remove('pressing');
            });
            
            return wrapper;
        }
        
        // 戳破泡泡
        function popBubble(wrapper, e) {
            const bubble = wrapper.querySelector('.bubble');
            if (bubble.classList.contains('popped')) return;
            
            const rect = bubble.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const x = centerX / window.innerWidth;
            const y = centerY / window.innerHeight;
            
            // 更新连击
            const now = Date.now();
            if (now - state.lastPopTime < 600) {
                state.combo++;
            } else {
                state.combo = 1;
            }
            state.lastPopTime = now;
            
            // 视觉更新
            bubble.classList.add('popped');
            
            // 显示凹坑
            setTimeout(() => {
                wrapper.querySelector('.bubble-dent').classList.add('show');
            }, 100);
            
            // 粒子效果
            const theme = themes[state.currentTheme];
            const isGolden = wrapper.dataset.golden === 'true';
            const color = isGolden ? '#ffd700' : theme.primary;
            createParticles(centerX, centerY, color);
            
            // 震动（如果支持）
            if (navigator.vibrate) {
                navigator.vibrate(isGolden ? [20, 30, 20] : 15);
            }
            
            // 音效
            playPopSound(x, y);
            
            // 统计数据
            state.popCount++;
            if (isGolden) {
                state.coins += 10;
                playComboSound(5);
            }
            
            updateStats();
            
            // 连击显示
            if (state.combo > 1 && state.combo % 5 === 0) {
                showCombo(state.combo);
                playComboSound(state.combo);
            }
            
            // 检查全部戳完
            checkComplete();
        }
        
        // 显示连击
        function showCombo(count) {
            comboText.textContent = count;
            comboText.classList.remove('show');
            void comboText.offsetWidth;
            comboText.classList.add('show');
            
            comboLabel.classList.remove('show');
            void comboLabel.offsetWidth;
            comboLabel.classList.add('show');
            
            // 连击数字动画
            comboCountEl.style.animation = 'none';
            void comboCountEl.offsetWidth;
            comboCountEl.style.animation = 'comboPulse 0.3s ease-out';
        }
        
        // 更新统计
        function updateStats() {
            popCountEl.textContent = state.popCount.toLocaleString();
            comboCountEl.textContent = state.combo;
            coinCountEl.textContent = state.coins.toLocaleString();
        }
        
        // 检查完成
        function checkComplete() {
            const allPopped = Array.from(grid.children).every(w => {
                return w.querySelector('.bubble').classList.contains('popped');
            });
            
            if (allPopped && !state.isAutoPopping) {
                setTimeout(resetGrid, 400);
            }
        }
        
        // 重置网格
        function resetGrid() {
            grid.innerHTML = '';
            for (let i = 0; i < 25; i++) {
                grid.appendChild(createBubble(i));
            }
            state.combo = 0;
            updateStats();
        }
        
        // 自动解压
        function autoPop() {
            if (state.isAutoPopping) return;
            state.isAutoPopping = true;
            
            const wrappers = Array.from(grid.children);
            const unpopped = wrappers.filter(w => {
                return !w.querySelector('.bubble').classList.contains('popped');
            });
            
            if (unpopped.length === 0) {
                state.isAutoPopping = false;
                return;
            }
            
            let i = 0;
            const interval = setInterval(() => {
                if (i >= unpopped.length) {
                    clearInterval(interval);
                    state.isAutoPopping = false;
                    return;
                }
                
                const wrapper = unpopped[i];
                const rect = wrapper.getBoundingClientRect();
                popBubble(wrapper, { clientX: rect.left, clientY: rect.top });
                i++;
            }, 80);
        }
        
        // 切换主题
        function toggleTheme() {
            themeSelector.classList.toggle('show');
        }
        
        // 主题选择
        document.querySelectorAll('.theme-dot').forEach(dot => {
            dot.addEventListener('click', () => {
                const themeIndex = parseInt(dot.dataset.theme);
                state.currentTheme = themeIndex;
                
                document.querySelectorAll('.theme-dot').forEach(d => d.classList.remove('active'));
                dot.classList.add('active');
                
                applyTheme(themes[themeIndex]);
                themeSelector.classList.remove('show');
            });
        });
        
        function applyTheme(theme) {
            document.querySelectorAll('.bubble:not(.popped):not(.golden)').forEach(bubble => {
                bubble.style.background = `
                    radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.4) 20%, transparent 40%),
                    radial-gradient(circle at 70% 70%, rgba(0,0,0,0.1) 0%, transparent 50%),
                    linear-gradient(135deg, ${theme.primary}80 0%, ${theme.secondary}90 100%)
                `;
                bubble.style.boxShadow = `
                    inset -5px -5px 15px rgba(0,0,0,0.3),
                    inset 5px 5px 15px rgba(255,255,255,0.4),
                    0 8px 25px ${theme.primary}40,
                    0 0 0 1px rgba(255,255,255,0.1)
                `;
            });
        }
        
        // 音效开关
        soundBtn.addEventListener('click', () => {
            state.soundEnabled = !state.soundEnabled;
            soundBtn.textContent = state.soundEnabled ? '🔊' : '🔇';
            if (state.soundEnabled) initAudio();
        });
        
        // 点击空白关闭主题选择器
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.theme-selector') && !e.target.closest('.control-btn')) {
                themeSelector.classList.remove('show');
            }
        });
        
        // 初始化
        resetGrid();
        
        // 首次点击初始化音频
        document.addEventListener('click', initAudio, { once: true });
        document.addEventListener('touchstart', initAudio, { once: true });
        
        // 防止双击缩放
        document.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });
        
        // 防止长按菜单
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
